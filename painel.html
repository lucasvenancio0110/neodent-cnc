<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Painel | Neodent CNC</title>
  <link rel="stylesheet" href="./assets/css/global.css">
  <link rel="stylesheet" href="./assets/css/pages/ronda.css">
  <link rel="stylesheet" href="./assets/css/pages/painel.css">
</head>
<body>
  <div class="ronda-app panel-app">
    <header class="ronda-topbar">
      <div>
        <span class="top-kicker">Painel</span>
        <strong>Fábrica</strong>
        <small id="panelClock">--</small>
      </div>
      <a href="./ronda.html" class="top-link">Ronda</a>
    </header>

    <main class="ronda-main panel-main">
      <section id="panelMetrics" class="panel-metrics ronda-summary"></section>

      <section class="filter-row panel-filter">
        <button class="filter-chip active" data-filter="TODAS">Todas</button>
        <button class="filter-chip" data-filter="SETUP">Setup</button>
        <button class="filter-chip" data-filter="AJUSTE">Ajuste</button>
        <button class="filter-chip" data-filter="MANUTENCAO">Manut.</button>
        <button class="filter-chip" data-filter="APOIO">Apoio</button>
      </section>

      <section id="painelBoard" class="factory-board"><div class="empty-state">Carregando...</div></section>
    </main>

    <nav class="bottom-nav">
      <a href="./ronda.html">Ronda</a>
      <a class="active" href="./painel.html">Painel</a>
      <a href="./apoio.html">Atividade</a>
      <a href="./setup.html">Setup</a>
      <a href="./index.html">Mais</a>
    </nav>
  </div>

  <script type="module" src="./assets/js/pages/painel.js"></script>
</body>
</html>
