<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Setup | Neodent CNC</title>
  <link rel="stylesheet" href="./assets/css/global.css">
  <link rel="stylesheet" href="./assets/css/pages/setup.css">
</head>
<body>
  <div class="app-shell">
    <main class="app-main app-grid">
      <section class="page-hero">
        <div class="eyebrow">Setups</div>
        <h1>Liberar setup com ciclo 100%</h1>
        <p>Todo setup liberado salva item, ciclo 100%, responsável, observação e histórico da TNL.</p>
      </section>

      <form id="setupForm" class="form-card stack">
        <div class="form-grid">
          <div class="field"><label>TNL</label><input class="input" name="tnl" required placeholder="112" inputmode="numeric"></div>
          <div class="field"><label>Item</label><input class="input" name="item" required placeholder="327161"></div>
          <div class="field"><label>Ciclo 100%</label><input class="input" name="ciclo_100" required placeholder="06:37,2"></div>
          <div class="field"><label>Responsável</label><input class="input" name="responsavel" placeholder="Lucas V"></div>
        </div>
        <div class="field"><label>Observação</label><textarea class="input" name="observacao" placeholder="Ex.: TNL 112-214 liberada"></textarea></div>
        <div class="action-row">
          <button class="btn btn-primary" type="submit">Liberar setup</button>
          <a class="btn btn-ghost" href="./historico.html">Ver histórico</a>
        </div>
      </form>

      <section id="setupMsg" class="empty-state">Pronto para liberar setup.</section>

      <section>
        <div class="section-title"><strong>Setups em aberto</strong><span id="setupCount">0</span></div>
        <div id="setupBoard" class="machine-board"><div class="empty-state">Carregando setups...</div></div>
      </section>
    </main>
  </div>
  <script type="module" src="./assets/js/pages/setup.js"></script>
</body>
</html>
