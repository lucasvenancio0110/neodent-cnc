<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Setup | Neodent CNC</title>
  <link rel="stylesheet" href="./assets/css/global.css">
  <link rel="stylesheet" href="./assets/css/pages/ronda.css">
  <link rel="stylesheet" href="./assets/css/pages/setup.css">
  <link rel="stylesheet" href="./assets/css/components/prep-polish.css">
</head>
<body>
  <div class="ronda-app setup-app">
    <header class="ronda-topbar">
      <div><span class="top-kicker">Setup</span><strong>Liberar</strong><small>Item, ciclo 100% e responsável</small></div>
      <a href="./apoio.html" class="top-link">Ao vivo</a>
    </header>
    <main class="ronda-main app-grid">
      <form id="setupForm" class="form-card stack compact-form">
        <div class="form-grid">
          <div class="field"><label>TNL</label><input class="input" name="tnl" required placeholder="112" inputmode="numeric"></div>
          <div class="field"><label>Item</label><input class="input" name="item" required placeholder="327161"></div>
          <div class="field"><label>Ciclo 100%</label><input class="input" name="ciclo_100" required placeholder="06:37,2"></div>
          <div class="field"><label>Responsável</label><input class="input" name="responsavel" placeholder="Lucas V"></div>
        </div>
        <div class="field"><label>Obs.</label><textarea class="input" name="observacao" placeholder="TNL 112-214 liberada"></textarea></div>
        <div class="action-row"><button class="btn btn-primary" type="submit">Liberar</button><a class="btn btn-ghost" href="./historico.html">Histórico</a></div>
      </form>
      <section id="setupMsg" class="empty-state">Pronto.</section>
      <section><div class="section-title"><strong>Setups abertos</strong><span id="setupCount">0</span></div><div id="setupBoard" class="machine-board"><div class="empty-state">Carregando...</div></div></section>
    </main>
    <nav class="bottom-nav prep-nav"><a href="./ronda.html">Linha</a><a href="./apoio.html">Ao vivo</a><a href="./relatorio.html">Passagem</a></nav>
  </div>
  <script type="module" src="./assets/js/pages/setup.js"></script>
</body>
</html>
