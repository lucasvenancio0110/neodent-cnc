<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Bootstrap Admin | Neodent CNC</title>
  <link rel="stylesheet" href="./assets/css/global.css">
  <link rel="stylesheet" href="./assets/css/pages/login.css">
</head>
<body>
  <main class="app-main" style="min-height:100vh;display:grid;place-items:center;">
    <section class="form-card" style="width:min(460px,100%);">
      <div class="brand" style="margin-bottom:18px;">
        <div class="brand-mark">NC</div>
        <div class="brand-text"><strong>Primeiro ADMIN</strong><span>Neodent CNC</span></div>
      </div>

      <div class="machine-detail" style="margin-bottom:12px;">
        Essa tela cria o primeiro administrador. Ela so funciona enquanto nao existir nenhum ADMIN no banco.
      </div>

      <form id="bootstrapForm" class="stack">
        <div class="field"><label>Nome</label><input class="input" name="nome" required placeholder="Lucas Venancio"></div>
        <div class="field"><label>Login</label><input class="input" name="login" required placeholder="lucas"></div>
        <div class="field"><label>Senha inicial</label><input class="input" name="senha" type="password" required placeholder="minimo 6 caracteres"></div>
        <button class="btn btn-primary btn-block" type="submit">Criar primeiro ADMIN</button>
        <div id="bootstrapMsg" class="machine-detail"></div>
      </form>
    </section>
  </main>
  <script type="module" src="./assets/js/pages/bootstrap-admin.js"></script>
</body>
</html>
