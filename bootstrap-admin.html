<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Bootstrap Admin | Neodent CNC</title>
  <link rel="stylesheet" href="./assets/css/global.css?v=4">
  <link rel="stylesheet" href="./assets/css/pages/login.css?v=4">
</head>
<body>
  <main class="app-main" style="min-height:100vh;display:grid;place-items:center;">
    <section class="form-card" style="width:min(460px,100%);">
      <div class="brand" style="margin-bottom:18px;">
        <div class="brand-mark">NC</div>
        <div class="brand-text"><strong>Primeiro ADMIN</strong><span>Neodent CNC</span></div>
      </div>

      <div class="machine-detail" style="margin-bottom:12px;">
        Essa tela cria o primeiro administrador. Ela so funciona enquanto nao existir nenhum ADMIN no banco.
      </div>

      <form id="bootstrapForm" class="stack">
        <div class="field"><label>Nome</label><input class="input" name="nome" required placeholder="Lucas Venancio"></div>
        <div class="field"><label>Login</label><input class="input" name="login" required placeholder="lucas"></div>
        <div class="field"><label>Senha inicial</label><input class="input" name="senha" type="password" required placeholder="minimo 6 caracteres"></div>
        <button class="btn btn-primary btn-block" type="submit">Criar primeiro ADMIN</button>
        <div id="bootstrapMsg" class="machine-detail">Carregando script v4...</div>
      </form>
    </section>
  </main>
  <script>
    const API_BASE = "https://neodent-cnc-api.lucassantanals0110.workers.dev";
    const form = document.getElementById("bootstrapForm");
    const msg = document.getElementById("bootstrapMsg");

    function show(text, bad) {
      msg.textContent = text;
      msg.style.color = bad ? "var(--bad)" : "var(--ok)";
    }

    show("API: " + API_BASE, false);

    form.addEventListener("submit", async function(event) {
      event.preventDefault();
      show("Criando ADMIN...", false);
      const button = form.querySelector("button[type='submit']");
      button.disabled = true;
      button.textContent = "Criando...";
      const data = Object.fromEntries(new FormData(form).entries());

      try {
        const res = await fetch(API_BASE + "/auth/bootstrap-admin", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
          cache: "no-store"
        });
        const text = await res.text();
        let json = null;
        try { json = JSON.parse(text); } catch (e) {}
        if (!res.ok) throw new Error((json && json.error) || text || "Erro ao criar admin");
        show("ADMIN criado. Agora va para login.html e entre com esse usuario.", false);
      } catch (err) {
        show("Falha ao chamar a API. Confira se o SQL foi executado no D1 e se o Worker esta publicado. Detalhe: " + (err.message || err), true);
      } finally {
        button.disabled = false;
        button.textContent = "Criar primeiro ADMIN";
      }
    });
  </script>
</body>
</html>
