<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Apoio | Neodent CNC</title>
  <link rel="stylesheet" href="./assets/css/global.css">
  <link rel="stylesheet" href="./assets/css/pages/apoio.css">
</head>
<body>
  <div class="app-shell">
    <main class="app-main app-grid">
      <section class="page-hero">
        <div class="eyebrow">Pedir ajuda</div>
        <h1>Fila de apoio</h1>
        <p>Máquinas que alguém abriu e informou que precisa de outro preparador/técnico.</p>
      </section>

      <section class="metric-grid">
        <div class="metric"><span>Aguardando</span><strong id="aguardandoCount">0</strong></div>
        <div class="metric"><span>Em atendimento</span><strong id="atendimentoCount">0</strong></div>
        <div class="metric"><span>Total aberto</span><strong id="totalCount">0</strong></div>
        <div class="metric"><span>Última atualização</span><strong id="lastUpdate">--:--</strong></div>
      </section>

      <section id="apoioBoard" class="machine-board">
        <div class="empty-state">Carregando pedidos de apoio...</div>
      </section>
    </main>
  </div>

  <script type="module" src="./assets/js/pages/apoio.js"></script>
</body>
</html>
