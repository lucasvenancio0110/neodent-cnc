<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Login | Neodent CNC</title>
  <link rel="stylesheet" href="./assets/css/global.css">
  <link rel="stylesheet" href="./assets/css/pages/login.css">
</head>
<body>
  <main class="app-main" style="min-height:100vh;display:grid;place-items:center;">
    <section class="form-card" style="width:min(460px,100%);">
      <div class="brand" style="margin-bottom:18px;">
        <div class="brand-mark">NC</div>
        <div class="brand-text"><strong>Neodent CNC</strong><span>Login operacional</span></div>
      </div>
      <form id="loginForm" class="stack">
        <div class="field"><label>Login</label><input class="input" name="login" autocomplete="username" required placeholder="lucas"></div>
        <div class="field"><label>Senha</label><input class="input" name="senha" type="password" autocomplete="current-password" required placeholder="••••••••"></div>
        <button class="btn btn-primary btn-block" type="submit">Entrar</button>
        <div id="loginError" class="machine-detail" style="color:var(--bad);"></div>
      </form>
    </section>
  </main>
  <script type="module" src="./assets/js/pages/login.js"></script>
</body>
</html>
