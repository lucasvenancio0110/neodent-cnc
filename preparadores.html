<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>Preparadores | Neodent CNC</title><link rel="stylesheet" href="./assets/css/global.css"><link rel="stylesheet" href="./assets/css/pages/preparadores.css"></head><body><div class="app-shell"><main class="app-main app-grid"><section class="page-hero"><div class="eyebrow">Preparadores</div><h1>Pedido de apoio</h1><p>Informe somente maquina, motivo, apoio e descricao.</p></section><form id="ocorrenciaForm" class="form-card stack"><div class="form-grid"><div class="field"><label>Maquina / TNL</label><input class="input" name="tnl" required placeholder="067" inputmode="numeric"></div><div class="field"><label>Precisa apoio?</label><select name="precisa_apoio" class="input"><option value="1">Sim</option><option value="0">Nao</option></select></div><div class="field field-wide"><label>Motivo da ajuda</label><input class="input" name="motivo" required placeholder="Quebra de bedame"></div></div><div class="field"><label>Descricao</label><textarea class="input" name="detalhe" placeholder="Descreva o necessario."></textarea></div><div class="action-row"><button class="btn btn-primary" type="submit">Abrir card</button><a class="btn btn-light" href="./painel.html">Ver painel</a></div></form><section id="ocorrenciaMsg" class="empty-state">Pronto para abrir card.</section><section><div class="section-title"><strong>Cards abertos</strong><span id="cardsCount">0</span></div><div id="cardsRecentes" class="machine-board"><div class="empty-state">Carregando...</div></div></section></main></div><script type="module" src="./assets/js/pages/preparadores.js"></script></body></html>
